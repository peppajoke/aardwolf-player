<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vestige - Aardwolf AI Player</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: #0a0a0a;
      color: #33ff33;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
      z-index: 100;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, rgba(51,255,51,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 99;
    }
    header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1a3a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .title { font-size: 1.2rem; font-weight: 700; color: #44ff44; text-shadow: 0 0 10px rgba(51,255,51,0.5); }
    .status { display: flex; gap: 1rem; align-items: center; font-size: 0.8rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #33ff33; box-shadow: 0 0 6px #33ff33; }
    .status-dot.disconnected { background: #ff3333; box-shadow: 0 0 6px #ff3333; }
    #terminal {
      flex: 1; overflow-y: auto; padding: 1rem; font-size: 0.85rem; line-height: 1.5;
      scrollbar-width: thin; scrollbar-color: #1a3a1a #0a0a0a;
    }
    #terminal::-webkit-scrollbar { width: 6px; }
    #terminal::-webkit-scrollbar-track { background: #0a0a0a; }
    #terminal::-webkit-scrollbar-thumb { background: #1a3a1a; border-radius: 3px; }
    .line { white-space: pre-wrap; word-wrap: break-word; margin-bottom: 2px; }
    .line.mud { color: #33ff33; }
    .line.command { color: #ffaa00; font-weight: 700; padding: 2px 6px; background: rgba(255,170,0,0.08); border-left: 3px solid #ffaa00; margin: 4px 0; }
    .line.command::before { content: "> "; color: #ff6600; }
    .line.system { color: #6699cc; font-style: italic; }
    .line.error { color: #ff4444; }
    footer { padding: 0.5rem 1rem; border-top: 1px solid #1a3a1a; font-size: 0.75rem; color: #336633; text-align: center; flex-shrink: 0; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <header>
    <div class="title">VESTIGE // AARDWOLF AI PLAYER</div>
    <div class="status">
      <span><span class="status-dot disconnected" id="statusDot"></span> <span id="statusText">Connecting...</span></span>
    </div>
  </header>
  <div id="terminal">
    <div class="line system">Initializing Aardwolf AI Player...</div>
    <div class="line system">Character: Vestige</div>
    <div class="line system">AI: DeepSeek</div>
    <div class="line system">Connecting to aardmud.org:4000...</div>
  </div>
  <footer>Vestige - An AI playing Aardwolf MUD autonomously via DeepSeek | Watch mode only</footer>
  <script>
    const terminal = document.getElementById("terminal");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    let autoScroll = true;

    terminal.addEventListener("scroll", () => {
      autoScroll = terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 50;
    });

    function addLine(className, text) {
      const div = document.createElement("div");
      div.className = "line " + className;
      div.textContent = text;
      terminal.appendChild(div);
      while (terminal.children.length > 2000) terminal.removeChild(terminal.firstChild);
      if (autoScroll) terminal.scrollTop = terminal.scrollHeight;
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      const ws = new WebSocket(proto + "//" + location.host);
      ws.onopen = () => addLine("system", "WebSocket connected to viewer");
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        switch (msg.type) {
          case "mud":
            msg.text.split("\n").forEach(line => { if (line.trim()) addLine("mud", line); });
            break;
          case "command":
            addLine("command", msg.text);
            break;
          case "status":
            statusDot.className = "status-dot " + (msg.connected ? "connected" : "disconnected");
            statusText.textContent = msg.connected ? "Connected to Aardwolf" : "Disconnected";
            if (msg.connected) addLine("system", "Connected to Aardwolf");
            break;
          case "error":
            addLine("error", "AI Error: " + msg.text);
            break;
        }
      };
      ws.onclose = () => { addLine("system", "Viewer disconnected. Reconnecting..."); setTimeout(connect, 3000); };
    }
    connect();
  </script>
</body>
</html>
